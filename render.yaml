# render.yaml - TalentMatch Deployment Config for Render.com
# Docs: https://render.com/docs/yaml-spec

services:
  # ---- Backend API ----
  - type: web
    name: talentmatch-api
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    healthCheckPath: /health
    plan: starter
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: talentmatch-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        value: https://talentmatch.onrender.com  # Update after frontend deploy
      - key: ANTHROPIC_API_KEY
        sync: false   # Set manually in Render dashboard
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_STANDARD
        sync: false
      - key: STRIPE_PRICE_PREMIUM
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM_EMAIL
        sync: false
      - key: SENDGRID_FROM_NAME
        value: TalentMatch

  # ---- Frontend Next.js ----
  - type: web
    name: talentmatch-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: starter
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://talentmatch-api.onrender.com/api  # Update to your API URL
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        sync: false

databases:
  - name: talentmatch-db
    plan: starter
    databaseName: talentmatch
    user: talentmatch_user
